# Alembic Configuration File

[alembic]
# Путь к папке с миграциями
script_location = alembic

# Шаблон имён файлов миграций
file_template = %%(rev)s_%%(slug)s

# URL подключения к БД (переопределяется из переменной окружения DATABASE_URL в env.py)
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/secure_access_bot

# Часовой пояс для временных меток в именах файлов
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
