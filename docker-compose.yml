services:
  bot:
    build: .
    container_name: secure_access_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/app

  postgres:
    image: postgres:16-alpine
    container_name: secure_access_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secure_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d secure_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: secure_access_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
