version: "3.9"

services:
  # --------------------------------------------------------
  # PostgreSQL база данных
  # --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: secure_access_bot_db
    restart: always
    environment:
      POSTGRES_DB: secure_access_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Опционально: закройте порт для production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d secure_access_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------
  # Миграции Alembic (запускаются один раз при старте)
  # --------------------------------------------------------
  migrate:
    build: .
    container_name: secure_access_bot_migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://botuser:botpassword@postgres:5432/secure_access_bot
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # --------------------------------------------------------
  # Telegram бот
  # --------------------------------------------------------
  bot:
    build: .
    container_name: secure_access_bot_app
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://botuser:botpassword@postgres:5432/secure_access_bot
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./logs:/app/logs   # Опционально: для файловых логов

# --------------------------------------------------------
# Persistent volume для данных PostgreSQL
# --------------------------------------------------------
volumes:
  postgres_data:
    driver: local
